name: Release

# Build and publish to PyPI when a version tag is pushed (e.g. v1.0.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token or secret required.
# One-time setup on PyPI: add a "pending publisher" for this repo at
#   https://pypi.org/manage/account/publishing/
# with owner=mojawave, repo=mojawave-python, workflow=release.yml,
# environment=pypi.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
